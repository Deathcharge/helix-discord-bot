[pytest]
# Pytest Configuration for Helix Discord Bot

python_files = test_*.py
python_classes = Test*
python_functions = test_*

minversion = 7.0
testpaths = tests

addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --cov=discord_bot_src
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    --cov-report=term-missing
    --cov-fail-under=80
    --timeout=300

markers =
    unit: Unit tests
    integration: Integration tests
    command: Command tests
    slow: Slow running tests
    asyncio: Async tests

asyncio_mode = auto

log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

[coverage:run]
source = discord_bot_src
omit = 
    */tests/*
    */site-packages/*
    setup.py
    __main__.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
    @abc.abstractmethod
